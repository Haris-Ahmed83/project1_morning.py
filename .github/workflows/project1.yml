name: Project 1 Generator (5:00 PM PKT)

on:
  schedule:
    - cron: '10 11 * * *'   # 4:10 PM PKT  =  11:10 AM UTC  (PKT is UTC+5)
  workflow_dispatch:          # also allow manual trigger from Actions tab

jobs:
  generate-project-1:
    name: Generate Project 1
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Run Project 1 Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: python project1_morning.py

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASS }}
          subject: "✅ Project 1 Created — ${{ github.run_number }}"
          to: ${{ secrets.GMAIL_USER }}
          from: GitHub Actions <${{ secrets.GMAIL_USER }}>
          body: |
            ✅ Project 1 (5:00 PM PKT) created successfully!

            📅 Date      : ${{ github.event.repository.updated_at }}
            ⏰ Time      : 5:00 PM PKT
            🔢 Run #     : ${{ github.run_number }}
            📋 Workflow  : ${{ github.workflow }}

            🔗 View your new repo:
            https://github.com/HarisAhmed83?tab=repositories

            — GitHub Actions Bot

      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASS }}
          subject: "❌ Project 1 FAILED — Run #${{ github.run_number }}"
          to: ${{ secrets.GMAIL_USER }}
          from: GitHub Actions <${{ secrets.GMAIL_USER }}>
          body: |
            ❌ Project 1 (5:00 PM PKT) run FAILED!

            ⏰ Time      : 5:00 PM PKT
            🔢 Run #     : ${{ github.run_number }}

            🔍 Check the full error log here:
            https://github.com/HarisAhmed83/${{ github.event.repository.name }}/actions/runs/${{ github.run_id }}

            — GitHub Actions Bot
